name: Synchro 4escape -> Gamedoor

# Robot quotidien : lit le CA + les sessions sur 4escape et les ecrit dans le
# Firebase du dashboard. Voir sync-4escape/README.md pour la configuration.

on:
  schedule:
    # Cible ~00h30 Paris (crons GitHub en UTC). GitHub RETARDE souvent les crons
    # de 30 min a 2h : le script accepte donc toute la fenetre 0h-9h de Paris et
    # dedoublonne via lastSync. Plusieurs declenchements pour la redondance :
    - cron: '33 22 * * *'   # 00:33 Paris (ete) / 23:33 (hiver, hors fenetre -> saute)
    - cron: '33 23 * * *'   # 01:33 Paris (ete) / 00:33 (hiver)
    - cron: '33 4 * * *'    # rattrapage matin : 06:33 (ete) / 05:33 (hiver)
  workflow_dispatch:
    inputs:
      target_date:
        description: "Jour a traiter (YYYY-MM-DD). Vide = hier (Paris)."
        required: false
        default: ''
      dry_run:
        description: "1 = telecharger + analyser mais NE RIEN ecrire dans Firebase (test)"
        required: false
        default: '0'

concurrency:
  group: sync-4escape
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sync-4escape/package-lock.json

      - name: Install deps
        working-directory: sync-4escape
        run: npm ci || npm install

      - name: Install Chromium
        working-directory: sync-4escape
        run: npx playwright install --with-deps chromium

      - name: Run sync
        working-directory: sync-4escape
        env:
          FE_BASE:      ${{ secrets.FE_BASE }}
          FE_USER:      ${{ secrets.FE_USER }}
          FE_PASS:      ${{ secrets.FE_PASS }}
          FB_URL:       ${{ secrets.FB_URL }}
          JOURNAL_PATH: ${{ secrets.JOURNAL_PATH }}
          # Avis Google : lit le JSON public du site GAMEDOOR41 par defaut ;
          # renseigner GOOGLE_PLACES_API_KEY (optionnel) pour interroger l'API en direct.
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          # SYNERGIA : SYN_READ_KEY lit les ventes co ; SYN_XP_KEY (clé "Lecture + XP")
          # active l'envoi d'XP à la cagnotte (paliers CA + avis). Sans elle, XP sautés.
          SYN_READ_KEY: ${{ secrets.SYN_READ_KEY }}
          SYN_XP_KEY:   ${{ secrets.SYN_XP_KEY }}
          SYN_API_BASE: ${{ secrets.SYN_API_BASE }}
          TZ:           'Europe/Paris'
          TARGET_DATE:  ${{ github.event.inputs.target_date || '' }}
          DRY_RUN:      ${{ github.event.inputs.dry_run     || '0' }}
          # '1' sur les runs planifies -> fenetre 0h-9h Paris + anti-doublon.
          SCHEDULED: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: node scrape.mjs

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-4escape
          path: sync-4escape/debug/
          if-no-files-found: ignore
          retention-days: 7
